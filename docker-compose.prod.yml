# =============================================================================
# Lead Audit Pro — Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: lap_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lap_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: lap_redis_prod
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - lap_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
      target: production
    container_name: lap_backend_prod
    restart: always
    env_file:
      - .env
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lap_internal
    command: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000

  celery_worker:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
      target: production
    container_name: lap_celery_worker_prod
    restart: always
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lap_internal
    command: celery -A app.workers.celery_worker worker --loglevel=warning --concurrency=8

  celery_beat:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
      target: production
    container_name: lap_celery_beat_prod
    restart: always
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - lap_internal
    command: celery -A app.workers.celery_worker beat --loglevel=warning

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
      target: production
    container_name: lap_frontend_prod
    restart: always
    env_file:
      - .env
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - lap_internal

  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: lap_nginx_prod
    restart: always
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - lap_internal
      - lap_external

volumes:
  postgres_data:
  redis_data:
  nginx_logs:

networks:
  lap_internal:
    driver: bridge
  lap_external:
    driver: bridge
